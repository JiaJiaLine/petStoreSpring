<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MyPetStoreSpring</title>
    <link rel="stylesheet" th:href="@{/css/mypetstore.css}" type="text/css" media="screen">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
<div id="Header" th:fragment="Header">
    <div id="Logo">
        <div id="LogoContent">
            <a th:href="@{/catalog/index}">
                <img style="vertical-align: middle;" th:src="@{/images/logo-topbar.gif}" alt="logo图片">
            </a>
        </div>
    </div>

    <div id="Menu">
        <div id="MenuContent">
            <a th:href="@{/cart/viewCart}">
                <img style="vertical-align: middle;" th:src="@{/images/cart.gif}" alt="cart图片">
            </a>

            <img style="vertical-align: middle;" th:src="@{/images/separator.gif}">

            <th:block th:if="${session.account == null}">
                <a th:href="@{/account/viewSignon}">Sign in</a>
                <img style="vertical-align: middle;" th:src="@{/images/separator.gif}">
            </th:block>

            <th:block th:if="${session.account != null}">
                <a href="/signoff">Sign out</a> <img style="vertical-align: middle;" th:src="@{/images/separator.gif}" />
                <a href="/account/editAccountForm">My account</a> <img style="vertical-align: middle;" th:src="@{/images/separator.gif}" />
            </th:block>

            <th:block th:if="${session.loginAccount != null and session.loginAccount.isManager()}">
                <a href="/manage/manageCategory">Modify</a> <img style="vertical-align: middle;" th:src="@{/images/separator.gif}" />
            </th:block>
            <a th:href="@{/help.html}">?</a>
        </div>
    </div>


    <div id="Search">
        <div id="SearchContent">
            <form th:action="@{/search}" method="post">
                <input type="text" name="keyword" size="14" id="keyword"/>
                <input type="submit" value="Search"/>
            </form>
            <div id="productSearchComplete">
                <ul id="productSearchUl">
                </ul>
            </div>
        </div>
    </div>

    <div id="QuickLinks">
        <a href="/catalog/viewCategory?categoryId=FISH"><img src="../images/sm_fish.gif" /></a>
        <img src="../images/separator.gif" />
        <a href="/catalog/viewCategory?categoryId=DOGS"><img src="../images/sm_dogs.gif" /></a>
        <img src="../images/separator.gif" />
        <a href="/catalog/viewCategory?categoryId=REPTILES"><img src="../images/sm_reptiles.gif" /></a>
        <img src="../images/separator.gif" />
        <a href="/catalog/viewCategory?categoryId=CATS"><img src="../images/sm_cats.gif" /></a>
        <img src="../images/separator.gif" />
        <a href="/catalog/viewCategory?categoryId=BIRDS"><img src="../images/sm_birds.gif" /></a>
    </div>

</div> <div id="Content">
    <div th:if="${message != null}" th:text="${message}" style="color: red;">
        这里会显示后端的提示信息（比如“登录失败”、“加入购物车成功”）
    </div>
</div>

</body>
</html>
