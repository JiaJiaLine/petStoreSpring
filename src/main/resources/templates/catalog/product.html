<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/mypetstore.css}" type="text/css" media="screen">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <title>Product Items</title>
</head>
<body>

    <div id="Content">
      <header th:replace="~{common/top::Header}"></header>
      <div id="BackLink">
        <a th:href="@{/catalog/viewCategory(categoryId=${product.categoryId})}">
          Return to <span th:text="${product.categoryName}"></span>
        </a>
        <div id="Catalog">
          <h2><span th:text="${product.productName}"></span></h2>
          <table>
            <tr>
              <th>Item ID</th>
              <th>Product ID</th>
              <th>Description</th>
              <th>List Price</th>
              <th>&nbsp;</th>
            </tr>
            <tr th:each="item : ${product.itemList}">
              <td>
                <a th:href="@{/catalog/viewItem(itemId=${item.itemId})}">
                  <span th:text="${item.itemId}"></span>
                </a>
              </td>
              <td>
                <span th:text="${product.productId}"></span>
              </td>
              <td>
                <span th:text="|${item.attribute1 != null ? item.attribute1 : ''} ${item.attribute2 != null ? item.attribute2 : ''} ${item.attribute3 != null ? item.attribute3 : ''} ${item.attribute4 != null ? item.attribute4 : ''} ${item.attribute5 != null ? item.attribute5 : ''} ${product.productName}|"></span>
              </td>
              <td>
                <span th:text="'$' + ${#numbers.formatDecimal(item.listPrice, 1, 'COMMA', 2, 'POINT')}"></span>
              </td>
              <td>
                <a th:href="@{/cart/addItemToCart(workingItemId=${item.itemId})}" class="Button">Add to Cart</a>
              </td>
            </tr>
          </table>
        </div>
      </div>
      <footer th:replace="~{common/bottom::Footer}"></footer>
    </div>

</body>
</html>
