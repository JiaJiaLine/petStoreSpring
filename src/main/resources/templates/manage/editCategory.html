<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>修改分类</title>
    <link rel="stylesheet" th:href="@{/css/mypetstore.css}" type="text/css" media="screen">
</head>
<body>
<header th:replace="~{common/top::Header}"></header>
<div id="Content">
    <h2>修改分类</h2>
    <form th:action="@{/manage/updateCategory}" method="post">
        <table>
            <tr><td>分类ID</td><td><input type="text" name="categoryId" th:value="${category.categoryId}" readonly/></td></tr>
            <tr><td>名称</td><td><input type="text" name="name" th:value="${category.categoryName}"/></td></tr>
            <tr><td colspan="2">
                <input type="submit" value="保存"/>
                <a th:href="@{/manage/index}">取消</a>
            </td></tr>
        </table>
    </form>
</div>
<footer th:replace="~{common/bottom::Footer}"></footer>
</body>
</html>
