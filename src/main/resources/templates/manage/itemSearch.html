<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Item Management</title>
  <link rel="stylesheet" th:href="@{/css/mypetstore.css}" type="text/css" media="screen">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script th:src="@{/js/itemSearch.js}"></script>
</head>

<body>
<header th:replace="~{common/top::Header}"></header>

<div id="Content">
  <div th:if="${msg != null}" th:text="${msg}" style="color: red; font-weight: bold; margin-bottom: 10px; text-align: center;"></div>

  <div id="BackLink">
    <a th:href="@{/manage/manageProduct}">Go to Product Management</a>
  </div>

  <div id="Catalog">
    <h2>Item (SKU) Management</h2>

    <div id="Search">
      <div id="SearchContent" class="search-add-container">
        <form th:action="@{/manage/searchItem}" method="post" style="margin: 0; display: flex; gap: 10px;">

          <select name="categoryId" id="categorySelect">
            <option value="">-- Select Category --</option>
            <option th:each="cat : ${categoryList}"
                    th:value="${cat.categoryId}"
                    th:text="${cat.name}">
            </option>
          </select>

          <select name="productId" id="productSelect">
            <option value="">-- Select Product --</option>
          </select>

          <input type="text" name="keyword" size="15" placeholder="Item ID..."/>
          <input type="submit" value="Search" class="Button"/>
        </form>

        <form th:action="@{/manage/addItemPage}" method="get" style="margin: 0;">
          <input type="submit" value="Add New SKU" class="Button" />
        </form>
      </div>
    </div>

    <table class="manage-table" style="margin: 0 auto; text-align: center; width: 100%;">
      <thead>
      <tr>
        <th>Item ID</th>
        <th>Product ID</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="item : ${itemList}">
        <td th:text="${item.itemId}"></td>
        <td th:text="${item.productId}"></td>
        <td th:text="${item.listPrice}"></td>

        <td><span th:text="${item.quantity != null ? item.quantity : 0}"></span></td>
        <td>
          <span th:if="${item.status == 'P'}" style="color: green; font-weight: bold;">On-Shelf</span>
          <span th:if="${item.status == 'N'}" style="color: red; font-weight: bold;">Off-Shelf</span>
        </td>

        <td>
          <a class="action-btn" th:href="@{/manage/editStockPage(itemId=${item.itemId})}">Stock</a>
          <a class="action-btn" th:href="@{/manage/toggleItemStatus(itemId=${item.itemId}, currentStatus=${item.status})}"
             th:text="${item.status == 'P' ? 'Delist' : 'List'}"></a>
          <a class="action-btn delete-btn" th:href="@{/manage/deleteItem(itemId=${item.itemId})}"
             onclick="return confirm('Are you sure you want to delete this SKU completely?');">Delete</a>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>

<footer th:replace="~{common/bottom::Footer}"></footer>
</body>
</html>
