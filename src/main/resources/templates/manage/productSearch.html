<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Product Management</title>
  <link rel="stylesheet" th:href="@{/css/mypetstore.css}" type="text/css" media="screen">
</head>
<body>
<header th:replace="~{common/top::Header}"></header>

<div id="Content">

  <div id="BackLink">
    <a th:href="@{/catalog/index}">Return to Main Menu</a> |
    <a th:href="@{/manage/manageCategory}">Go to Category Management</a>
  </div>

  <div id="Catalog">
    <h2>Product Management</h2>


      <div id="SearchContent" class="search-add-container">
        <form th:action="@{/manage/searchProduct}" method="post" style="margin: 0; display: flex; gap: 10px;">

          <select name="categoryId">
            <option value="">-- All Categories --</option>
            <option th:each="cat : ${categoryList}"
                    th:value="${cat.categoryId}"
                    th:text="${cat.name}"
                    th:selected="${cat.categoryId == currentCategoryId}">
            </option>
          </select>

          <input type="text" name="keyword" size="20" placeholder="Product ID or Name..." th:value="${currentKeyword}"/>

          <input type="submit" value="Search" class="Button"/>
        </form>

        <form th:action="@{/manage/addProductPage}" method="get" style="margin: 0;">
          <input type="submit" value="Add New Product" class="Button" />
        </form>
      </div>


    <div th:if="${msg != null}"
         class="alert-msg"
         th:text="${msg}"
         th:classappend="${msgType == 'Success'} ? 'msg-success':'msg-error'" >
    </div>

    <table class="manage-table" style="margin: 0 auto; text-align: center; width: 100%;">
      <thead>
      <tr>
        <th>Product ID</th>
        <th>Category ID</th>
        <th>Name</th>
        <th>Actions</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="product : ${productList}">
        <td th:text="${product.productId}"></td>
        <td th:text="${product.categoryId}"></td>
        <td th:text="${product.name}"></td>
        <td>
          <a class="action-btn" th:href="@{/manage/editProductPage(productId=${product.productId})}">Edit</a>
          <a class="action-btn delete-btn" th:href="@{/manage/deleteProduct(productId=${product.productId})}"
             onclick="return confirm('Are you sure you want to delete this product?');">Delete</a>
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(productList)}">
        <td colspan="4" style="text-align: center; color: #666;">No products found.</td>
      </tr>
      </tbody>
    </table>
  </div>
</div>

<footer th:replace="~{common/bottom::Footer}"></footer>
</body>
</html>
