<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>error</title>
    <link rel="stylesheet" th:href="@{/css/mypetstore.css}" type="text/css" media="screen">
</head>
<body>
<header th:replace="~{common/top::Header}"></header>

<div id="Content">
    <div id="BackLink">
        <a th:href="@{/catalog/index}">Return to Main Menu</a>
    </div>

    <div id="Catalog">
        <h2>Error</h2>
        <div th:if="${errorMsg != null}" th:text="${errorMsg}" style="color: red; font-weight: bold; margin-bottom: 10px;"></div>
    </div>
</div>
</div>

<footer th:replace="~{common/bottom::Footer}"></footer>
</body>
</html>
