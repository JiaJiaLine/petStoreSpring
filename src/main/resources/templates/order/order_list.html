<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>订单列表</title>
</head>
<body>
<h1>订单列表</h1>
<table border="1">
  <tr>
    <th>订单ID</th>
    <th>用户ID</th>
    <th>总金额</th>
    <th>状态</th>
  </tr>
  <tr th:each="order : ${orders}">
    <td th:text="${order.orderId}"></td>
    <td th:text="${order.userId}"></td>
    <td th:text="${order.totalPrice}"></td>
    <td th:text="${order.status}"></td>
  </tr>
</table>
</body>
</html>
