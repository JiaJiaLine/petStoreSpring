<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Orders</title>
    <link rel="stylesheet" th:href="@{/css/mypetstore.css}" type="text/css" media="screen">
</head>
<body>
<header th:replace="~{common/top::Header}"></header>

<div id="Content">
    <div id="BackLink">
        <a th:href="@{/catalog/index}">Return to Main Menu</a>
    </div>

    <div id="Catalog">
        <h2>My Orders</h2>

        <table class="manage-table" style="margin: 0 auto; width: 80%; text-align: center;">
            <tr>
                <th>Order ID</th>
                <th>Date</th>
                <th>Total Price</th>
                <th>Action</th>
            </tr>
            <tr th:if="${#lists.isEmpty(orderList)}">
                <td colspan="4">You have not placed any orders yet.</td>
            </tr>
            <tr th:each="order : ${orderList}">
                <td th:text="${order.orderId}"></td>
                <td th:text="${#dates.format(order.orderDate, 'yyyy-MM-dd HH:mm')}"></td>
                <td th:text="${'$' + #numbers.formatDecimal(order.totalPrice, 1, 'COMMA', 2, 'POINT')}"></td>
                <td>
                    <a th:href="@{/order/viewOrder(orderId=${order.orderId})}" class="Button">View Details</a>
                </td>
            </tr>
        </table>
    </div>
</div>

<footer th:replace="~{common/bottom::Footer}"></footer>
</body>
</html>
